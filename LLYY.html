<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日快乐🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea, #764ba2);
            /* 梦幻紫蓝渐变风格 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "微软雅黑", sans-serif;
            text-align: center;
            position: relative;
            background-size: 200% 200%;
            animation: bgMove 10s infinite alternate;
            /* 背景流动动画 */
        }

        /* 左上角小型板块：装头像+文本，小巧不影响整体 */
        .top-left-box {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 130px;
            /* 小巧尺寸 */
            height: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 8px;
            z-index: 50;
            /* 不遮挡弹窗和主内容 */
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .top-left-box img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            /* 头像圆形 */
            object-fit: cover;
            border: 2px solid #fff;
        }

        .top-left-box .text {
            font-size: 14px;
            /* 小字体，不突兀 */
            color: #fff;
            text-shadow: 0 0 3px #a855f7;
            line-height: 1.4;
            text-align: left;
        }

        /* 进入弹窗样式 */
        .enter-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(118, 75, 162, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            animation: popupFade 0.5s ease-in-out;
        }

        .enter-popup h2 {
            font-size: 8vw;
            color: #fff;
            text-shadow: 0 0 20px #a855f7, 0 0 30px #fff;
            animation: bounceIn 1.2s ease-in-out;
        }

        h1 {
            font-size: 6.5vw;
            color: #fff;
            text-shadow: 0 0 15px #a855f7, 0 0 25px #fff;
            animation: glow 2s infinite alternate;
            /* 文字发光动画 */
            margin-bottom: 10px;
            font-weight: bold;
        }

        .tip {
            font-size: 2.8vw;
            color: #f0e6ff;
            text-shadow: 0 0 8px #a855f7;
            margin-bottom: 20px;
            animation: fade 3s infinite alternate;
        }

        .cake {
            font-size: 16vw;
            margin: 10px 0;
            animation: float 3s infinite ease-in-out;
            /* 蜡烛动画 */
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .cake:hover {
            transform: scale(1.15);
            filter: brightness(1.2);
        }

        .wish {
            font-size: 4.2vw;
            color: #f0e6ff;
            line-height: 1.8;
            text-shadow: 0 0 8px #a855f7;
            margin-bottom: 20px;
        }

        .heart {
            position: absolute;
            font-size: 7vw;
            animation: floatHeart 8s infinite linear;
            opacity: 0.9;
            color: #fbcfe8;
        }

        /* 愿望输入框样式 - 同步风格 */
        .wish-input-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
            width: 85vw;
            display: none;
            z-index: 100;
        }

        .wish-input-box h2 {
            color: #764ba2;
            font-size: 4.2vw;
            margin-bottom: 20px;
            text-shadow: 0 0 5px #e9d5ff;
        }

        #wishInput {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #e9d5ff;
            border-radius: 12px;
            font-size: 3.2vw;
            resize: none;
            margin-bottom: 20px;
            outline: none;
            background: #faf5ff;
            transition: border-color 0.3s ease;
        }

        #wishInput:focus {
            border-color: #a855f7;
        }

        #wishBtn {
            padding: 12px 40px;
            background: #764ba2;
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 3.2vw;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 10px rgba(118, 75, 162, 0.3);
        }

        #wishBtn:hover {
            background: #8b5cf6;
            transform: translateY(-2px);
        }

        /* 遮罩层 */
        .mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            z-index: 99;
            backdrop-filter: blur(3px);
            /* 模糊效果 */
        }

        /* 愿望展示样式 - 同步风格 */
        .wish-show {
            margin-top: 20px;
            font-size: 3.8vw;
            color: #fff;
            text-shadow: 0 0 8px #a855f7;
            padding: 15px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            max-width: 90vw;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* 动画效果 */
        @keyframes glow {
            from {
                filter: brightness(1);
                text-shadow: 0 0 15px #a855f7, 0 0 25px #fff;
            }

            to {
                filter: brightness(1.4);
                text-shadow: 0 0 20px #a855f7, 0 0 30px #fff, 0 0 35px #c084fc;
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-25px);
            }
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes fade {
            from {
                opacity: 0.7;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes bgMove {
            from {
                background-position: 0% 50%;
            }

            to {
                background-position: 100% 50%;
            }
        }

        /* 弹窗动画 */
        @keyframes popupFade {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            70% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes popupOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
                transform: scale(0.8);
            }
        }
    </style>
</head>

<body>
    <!-- 左上角小型板块：容纳头像+文本，小巧不影响整体 -->
    <div class="top-left-box">
        <!-- 文件夹内头像引用：将头像图片放入和HTML文件同一文件夹，替换下方文件名即可 -->
        <img src="./img/IMG_1575.jpg" alt="">
        <div class="text">专属祝福<br>只为你</div>
    </div>

    <!-- 进入弹窗：点进去瞬间弹出 -->
    <div class="enter-popup" id="enterPopup">
        <h2>周盈莹生日快乐🎉</h2>
    </div>

    <h1>✨ 生日快乐 ✨</h1>
    <div class="tip">点击蜡烛，许下你的专属愿望吧🎋</div>
    <div class="cake" id="cake">🎂</div>
    <div class="wish">
        愿平安喜乐<br>
        万事顺意<br>
        岁岁年年皆美好
    </div>
    <div class="wish-show" id="wishShow"></div>

    <!-- 愿望输入弹窗 -->
    <div class="mask" id="mask"></div>
    <div class="wish-input-box" id="wishInputBox">
        <h2>愿往后，你许下的愿望一定会实现✨</h2>
        <textarea id="wishInput" placeholder="你的生日愿望是什么，别让别人看见，不然就不灵了..."></textarea>
        <button id="wishBtn">许愿✨</button>
    </div>

    <!-- 飘落爱心特效 -->
    <script>
        // 自动生成漂浮爱心
        for (let i = 0; i < 15; i++) {
            let heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 6 + 's';
            document.body.appendChild(heart);
        }

        // 进入弹窗自动消失（2秒后消失，过渡自然）
        const enterPopup = document.getElementById('enterPopup');
        setTimeout(() => {
            enterPopup.style.animation = 'popupOut 0.8s ease-in-out forwards';
            setTimeout(() => {
                enterPopup.style.display = 'none';
            }, 800);
        }, 2000);


        // 蜡烛点击触发愿望输入
        const cake = document.getElementById('cake');
        const wishInputBox = document.getElementById('wishInputBox');
        const mask = document.getElementById('mask');
        const wishInput = document.getElementById('wishInput');
        const wishBtn = document.getElementById('wishBtn');
        const wishShow = document.getElementById('wishShow');

        cake.addEventListener('click', () => {
            wishInputBox.style.display = 'block';
            mask.style.display = 'block';
            wishInput.focus(); // 自动聚焦输入框
        });

        // 关闭弹窗（点击遮罩）
        mask.addEventListener('click', () => {
            wishInputBox.style.display = 'none';
            mask.style.display = 'none';
        });

        // 提交愿望
        wishBtn.addEventListener('click', () => {
            const wishText = wishInput.value.trim();
            if (wishText) {
                wishShow.innerHTML = `你的愿望：${wishText}`;
                wishShow.style.display = 'block';
                wishInputBox.style.display = 'none';
                mask.style.display = 'none';
                wishInput.value = ''; // 清空输入框
            } else {
                alert('请输入你的生日愿望哦～');
            }
        });

        // 回车提交愿望
        wishInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                wishBtn.click();
            }
        });
    </script>
</body>

</html>
